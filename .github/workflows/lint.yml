name: 🔎 Lint
on:
  push:
    branches: [main, wip/**]
  pull_request:
permissions:
  contents: read

jobs:
  lint:
    name: 🔎 Lint Code
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    env: { pg: 19 }
    steps:
      - name: Install Postgres
        run: NO_CLUSTER=1 pg-start ${{ env.pg }} libcurl4-openssl-dev uuid-dev liblz4-dev libzstd-dev clang-tidy bear shellcheck
      - name: Checkout the Repository
        uses: actions/checkout@v6
        with: { submodules: true }
      - name: Install pre-commit
        run: make debian-install-lint
      - name: Add Postgres to Path
        run: echo /usr/lib/postgresql/${{ env.pg }}/bin >> "$GITHUB_PATH"
      - name: Generate compile_commands.json
        run: make compile_commands.json
      - name: Lint the Code
        run: make lint
