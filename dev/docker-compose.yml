# Run containers for each supported major version of ClickHouse. Each is based
# on [pgxn-tools] to simplify testing and has PostgreSQL 19 running. Both
# databases servers are on their usual ports and trust local connections
# without passwords.
#
# Keep in sync with .github/workflows/clickhouse.yml

networks:
  default:
    name: pgch

volumes:
  config:

services:
  ch_26_7:
    image: pgxn/pgxn-tools
    container_name: ch_26_7
    platform: linux/amd64
    stdin_open: true
    stop_grace_period: 10ms
    environment:
      CH_RELEASE: 26.7.1.1315-stable
    working_dir: /work
    volumes:
      - ..:/work
    command: >
      /bin/sh -c '
        .github/ubuntu/clickhouse.sh
        pg-start 19 libcurl4-openssl-dev uuid-dev liblz4-dev libzstd-dev libre2-dev libicu-dev
        printf "ClickHouse $$CH_RELEASE and Postgres 19 started"
        tail -f /dev/null
      '
